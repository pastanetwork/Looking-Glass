name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check modules main.py lg.py minification

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: pytest tests/ -v --tb=short
        env:
          DEV: "True"
          REDIS_PASSWORD: "ci-dummy"
          IP_HASH_SALT: "ci-dummy-salt"
          TURNSTILE_DEV_BYPASS: "True"

  assets:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm install --no-audit --no-fund
      - run: python minification/minify.py --ci
      - uses: actions/upload-artifact@v4
        with:
          name: static-assets
          path: static/
