# Redis interne au conteneur Looking Glass.
# Éphémère : aucune persistance, sert uniquement au rate-limiting,
# aux plafonds de concurrence et aux budgets speedtest.

bind 127.0.0.1
port 6379
protected-mode yes

# Aucune persistance disque.
save ""
appendonly no

# Mémoire bornée : éviction des clés les moins récemment utilisées.
maxmemory 96mb
maxmemory-policy allkeys-lru

dir /tmp
loglevel notice
