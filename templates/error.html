{% extends "base.html" %}
{% block title %}{{ t('error_title') }}{% endblock %}

{% block content %}
<div class="lg-reveal mx-auto flex max-w-xl flex-col items-center px-4 py-24 text-center sm:px-6">
    <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-gold/10 text-gold">
        <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
    </div>
    <div class="mt-6 text-7xl font-semibold tracking-tight text-gold">{{ error_code }}</div>
    <p class="mt-3 text-lg text-text-secondary">{{ i18n(error_message_key) }}</p>
    <a href="/"
       class="mt-8 inline-flex items-center gap-2 rounded-lg bg-gold px-5 py-2.5 text-sm font-semibold
              text-dark transition hover:bg-gold-hover">
        <i class="fa-solid fa-arrow-left"></i>{{ i18n('error_back') }}
    </a>
</div>
{% endblock %}
